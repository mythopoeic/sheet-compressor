name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  python:
    name: Python conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The pure core has zero required deps; the conformance suite runs on
      # stdlib `unittest` alone, so no `pip install` step is needed.
      - run: python -m unittest discover -s tests -v
      # Optional openpyxl adapter (SPEC §8). Installed only here so consumers
      # who never call read_sheet() don't pay the dep cost. The adapter tests
      # auto-skip when openpyxl is absent, so the discovery run above stays
      # core-only.
      - run: pip install openpyxl
      - run: python -m unittest tests.test_xlsx_adapter -v

  csharp:
    name: C# conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet build SheetCompressor.sln --configuration Release
      - run: dotnet test SheetCompressor.sln --configuration Release --no-build

  go:
    name: Go conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - run: go vet ./...
      - run: go test ./...
      # Build-tag-gated excelize adapter (SPEC §8). Fetched here only — the
      # committed go.mod keeps the core dep-free so consumers who never call
      # the adapter never pay the excelize cost.
      - run: go get github.com/xuri/excelize/v2
      - run: go test -tags sheetcompressor_excelize ./xlsx/...

  officescript:
    name: Office Script bundle drift-guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/officescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/officescript/package-lock.json
      - run: npm ci
      # The .osts must stay byte-identical to the TS reference core and remain
      # ExcelScript-pure; the drift guard regenerates and diffs.
      - run: npm run typecheck
      - run: npm test
