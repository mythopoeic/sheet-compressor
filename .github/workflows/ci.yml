name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  csharp:
    name: C# conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet build SheetCompressor.sln --configuration Release
      - run: dotnet test SheetCompressor.sln --configuration Release --no-build
