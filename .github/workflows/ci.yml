name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    name: TypeScript conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/typescript/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  go:
    name: Go conformance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - run: go vet ./...
      - run: go test ./...
