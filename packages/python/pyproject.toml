[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "sheet-compressor"
version = "0.0.0"
description = "Python port of the SheetCompressor encoding from the SpreadsheetLLM paper."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "sheet-compressor authors" }]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
]

[project.optional-dependencies]
tokenizer = ["tiktoken>=0.7"]
xlsx = ["openpyxl>=3.1"]

[tool.setuptools.packages.find]
where = ["."]
include = ["sheet_compressor*"]
