[build-system]
requires = ["setuptools>=77"]
build-backend = "_build_backend"
backend-path = ["."]

[project]
name = "sheet-compressor"
version = "0.1.1"
description = "Independent Python implementation of the SpreadsheetLLM SheetCompressor encoding for token-efficient LLM workflows."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.9"
authors = [{ name = "William Fehringer" }]
classifiers = [
  "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/mythopoeic/sheet-compressor"
Repository = "https://github.com/mythopoeic/sheet-compressor"
Issues = "https://github.com/mythopoeic/sheet-compressor/issues"

[project.optional-dependencies]
tokenizer = ["tiktoken>=0.7"]
xlsx = ["openpyxl>=3.1"]

[tool.setuptools.packages.find]
where = ["."]
include = ["sheet_compressor*"]

# The shared prompt templates, vendored into the package at build time by the
# in-tree backend (see _build_backend.py). Required at import (sheet_compressor/prompts.py).
[tool.setuptools.package-data]
sheet_compressor = ["prompts/*.md", "prompts/**/*.md"]
